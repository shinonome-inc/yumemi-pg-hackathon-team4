# https://github.com/firebase/firebase-tools

name: Flutter Web CD
on:
  push:
    branches: ["main", "develop", "feature/**"]
permissions:
  checks: write
  contents: read
  pull-requests: write
jobs:
  build_and_preview:
    runs-on: ubuntu-latest
    steps:
      - name: Clone repository
        uses: actions/checkout@v4
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.29.0
      - name: Generate .env
        run: echo "${{ secrets.ENV }}" | base64 --decode > .env
        working-directory: client
      - name: Generate firebase_options.dart
        run: echo "${{ secrets.FIREBASE_OPTIONS_DART }}" | base64 --decode > lib/firebase_options.dart
        working-directory: client
      - name: Install dependencies
        run: flutter pub get
        working-directory: client
      - name: Build Web App
        run: flutter build web
        working-directory: client
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_TERRAFORM_GCP_LEARNING_YO2 }}
          projectId: terraform-gcp-learning-yo2
          entryPoint: ./client
          channelId: live
        env:
          FIREBASE_CLI_EXPERIMENTS: webframeworks
