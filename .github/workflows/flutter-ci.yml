name: Flutter CI
on:
  push:
    branches:
      - main
      - develop
      - feature/**
    # TODO: apiやinfraリポジトリ作成後にコメントアウトを解除する。
    # paths:
    #   - 'client'
jobs:
  flutter_ci:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Clone repository
        uses: actions/checkout@v4
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.29.0
      - name: Generate .env
        run: echo "${{ secrets.ENV }}" | base64 --decode > .env
        working-directory: client
      - name: Generate firebase_options.dart
        run: echo "${{ secrets.FIREBASE_OPTIONS_DART }}" | base64 --decode > lib/firebase_options.dart
        working-directory: client
      - name: Install dependencies
        run: flutter pub get && dart pub get
        working-directory: client
      - name: Run build_runner
        run: dart run build_runner watch -d
        working-directory: client
      - name: Run flutter analyze
        run: flutter analyze
        working-directory: client
